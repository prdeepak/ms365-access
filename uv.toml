# Enforce the uv version this config assumes. `exclude-newer` below is fixed-date
# behaviour specific to uv 0.10.x, and the lock files are byte-compared against a
# fresh recompile by scripts/check_locks.sh — a resolver change between minors
# would make correct locks look stale. uv itself errors on a mismatch:
#     error: Required uv version `...` does not match the running version `...`
# which is a far clearer failure than the lock diff you would otherwise chase.
#
# A range, not an exact pin: patch releases flow through, the minor bump that
# could change resolution is gated. Keep in step with the uv installed by the
# lock-sync job in .github/workflows/ci.yml.
required-version = ">=0.10.4,<0.11"

# Seasoning: refuse to resolve packages uploaded AFTER this date (safety floor
# for ad-hoc `uv pip install` / venv rebuilds). FIXED DATE only on uv 0.10.x — bump ~monthly.
#
# Set to 2026-06-17 to clear a batch of CVE fixes that published after the prior 2026-06-02
# floor: starlette 1.3.1 (CVE-2026-54282/54283), python-multipart 0.0.31 (CVE-2026-53538/
# 53539/53540), and cryptography 48.0.1 (GHSA-537c-gmf6-5ccf). The floor must sit just past
# those releases or uv resolves back to the vulnerable versions. uv reads this config floor
# automatically (do NOT also pass --exclude-newer on the CLI — combining the two resolves
# differently). Bump this date forward ~monthly as deps age.
#
# Bumped to 2026-06-20 to admit pydantic-settings 2.14.2 (GHSA-4xgf-cpjx-pc3j, published
# 2026-06-19) — the fix for a symlink out-of-tree secrets read + secrets_dir_max_size bypass
# in NestedSecretsSettingsSource. The floor must sit just past that release or uv resolves
# back to the vulnerable 2.14.1.
#
# Bumped to 2026-06-27 to admit mcp 1.28.1 (published 2026-06-26) — fixes CVE-2026-52870
# (unscoped experimental-tasks handlers leak/cancel other clients' tasks), CVE-2026-52869
# (HTTP transports don't bind sessions to the authenticating principal), and CVE-2026-59950
# (deprecated WebSocket transport skips Host/Origin validation). The floor must sit just
# past that release or uv resolves back to the vulnerable 1.27.1.
exclude-newer = "2026-06-27"
