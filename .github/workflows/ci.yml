name: CI

# Backend-only, no-credentials smoke tests. A green check means the API app and
# its routers still import, the FastAPI route table builds, /health responds 200,
# the MCP server imports and registers its tools, and the locked dependencies
# resolve under hash verification.
#
# Two smoke jobs because the API and the MCP server have disjoint, separately
# locked dependency sets: backend-smoke covers requirements.lock, mcp-smoke
# covers requirements-mcp.lock (the set Dockerfile.mcp ships). An `mcp` bump
# only changes the latter, so without mcp-smoke nothing in CI would import it.
#
# lock-sync guards the seam between them: Dependabot edits the .txt files and
# never the uv-generated locks, so a bump can land inert with the two files
# disagreeing (that shipped as #65 and #69). It fails on the Dependabot PR
# itself instead of relying on a reviewer to notice.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock

      - name: Install locked dependencies (hash-verified)
        # API runtime lock + dev lock (pytest). Both are uv-generated with
        # --generate-hashes, so --require-hashes verifies every artifact.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes \
            -r requirements.lock \
            -r requirements-dev.lock

      - name: Run smoke tests
        # Dummy, non-secret values — the repo's Settings has four required,
        # default-less fields and app/main.py calls get_settings() at import
        # time, so a single SECRET_KEY is not enough; all four are required.
        env:
          AZURE_CLIENT_ID: ci-not-real
          AZURE_CLIENT_SECRET: ci-not-real
          AZURE_TENANT_ID: ci-not-real
          SECRET_KEY: ci-test-secret-not-used-for-real-auth
        run: python -m pytest -q

  mcp-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-mcp.lock
            backend/requirements-dev.lock

      - name: Install MCP runtime lock (hash-verified)
        # requirements-mcp.lock is exactly what Dockerfile.mcp installs, so this
        # exercises the shipped dependency set. The dev lock adds pytest; the two
        # locks share no package, so --require-hashes is satisfiable across both.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes \
            -r requirements-mcp.lock \
            -r requirements-dev.lock

      - name: Run MCP smoke tests
        # Only this file — the rest of tests/ imports fastapi/app, which are
        # deliberately absent from the MCP runtime lock. No credentials needed:
        # mcp_server.py reads MS365_API_URL/MS365_API_KEY lazily at call time.
        run: python -m pytest -q tests/test_mcp_smoke.py

  lock-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        # Must satisfy `required-version` in uv.toml — uv refuses to run otherwise.
        # Keep these two in step when bumping; nothing updates them automatically
        # (Dependabot reads requirements files and `uses:` lines, not `run:` steps).
        run: pip install "uv>=0.10.4,<0.11"

      - name: Verify locks match their requirements files
        # Recompiles each lock onto a copy of itself, so committed pins are
        # preferred and only .txt-driven changes surface. See scripts/check_locks.sh.
        run: ./scripts/check_locks.sh
