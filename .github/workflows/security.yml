name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit

      # Audit the hash-pinned locks.
      - name: Audit API dependencies
        run: pip-audit -r backend/requirements.lock

      - name: Audit MCP dependencies
        run: pip-audit -r backend/requirements-mcp.lock
