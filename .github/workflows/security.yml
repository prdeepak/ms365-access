name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit

      # Audit the hash-pinned locks. The three ignored starlette advisories all
      # require the starlette>=1.0 / fastapi co-upgrade (tracked separately);
      # remove the ignores once that upgrade lands.
      - name: Audit API dependencies
        run: >-
          pip-audit -r backend/requirements.lock
          --ignore-vuln PYSEC-2026-161
          --ignore-vuln CVE-2024-47874
          --ignore-vuln CVE-2025-54121

      - name: Audit MCP dependencies
        run: pip-audit -r backend/requirements-mcp.lock
