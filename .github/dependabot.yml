# Dependabot keeps dependencies patched and flags known-vulnerable versions.
# Free on private repos. PRs land for you to review; read the changelog before merging,
# then regenerate the lock:
#   uv pip compile backend/requirements.txt --generate-hashes --python-version 3.11 -o backend/requirements.lock
#   uv pip compile backend/requirements-mcp.txt --generate-hashes --python-version 3.11 -o backend/requirements-mcp.lock
#   uv pip compile backend/requirements-dev.txt --generate-hashes --python-version 3.11 -c backend/requirements.lock -o backend/requirements-dev.lock
#
# These commands rewrite an EXISTING lock, and uv treats the versions already
# pinned there as preferences: it changes only what the edited .txt (or a moved
# uv.toml exclude-newer floor) forces, leaving every other pin alone. That is
# intentional — a security bump lands as a one-package diff instead of dragging
# in unrelated churn. Two consequences worth knowing:
#   - Compiling to a NEW path resolves from scratch and will pick newer versions
#     than the committed lock. That is not drift; do not "fix" it.
#   - To deliberately refresh every pin, pass --upgrade (and review the result).
# Add --refresh when bumping to a just-published release, so uv re-reads the
# index instead of a cached copy that may not list it yet.
version: 2

updates:
  # Python API deps — Dependabot reads requirements.txt (the source ranges).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # SEASONING: hold non-security version bumps for 30 days after release.
    # Security/CVE advisories still land immediately regardless of this setting.
    # Reference: https://github.blog/changelog/2025-07-01-dependabot-supports-configuration-of-a-minimum-package-age/
    cooldown:
      default-days: 30
      semver-patch-days: 7
    # Collapse routine minor/patch bumps into ONE PR (fewer reviews; also avoids the
    # branch-protection rebase cascade of N single PRs). Majors stay separate for review.
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in CI patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    cooldown:
      default-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
